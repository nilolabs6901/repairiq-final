<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Wrench -->
  <g transform="translate(256,256) rotate(-45)" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-60,-100 L-60,-40 L-30,-10 L30,-10 L60,-40 L60,-100" />
    <line x1="0" y1="-10" x2="0" y2="120"/>
    <circle cx="0" cy="-70" r="15" fill="white" stroke="none"/>
  </g>
  <!-- Magnifying glass -->
  <g transform="translate(310,310)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round">
    <circle cx="-40" cy="-40" r="50" opacity="0.9"/>
    <line x1="0" y1="0" x2="40" y2="40" opacity="0.9"/>
  </g>
</svg>
